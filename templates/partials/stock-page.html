
<!-- hx-swap-oob="true" says send itself back to index.html div where id = stock-page and reloads itself -->
<div id="stock-page" hx-swap-oob="true">
    <nav aria-label="...">
        <ul class="pagination pagination-sm justify-content-end">
            {% for page_number in range(1, 1 + (items|length) // 12) %}
                {% if current_page == page_number %}
                <li class="page-item active"><a class="page-link">{{page_number}}</a></li>
                {% else %}
                    <li class="page-item">
                        <a class="page-link"
                           hx-get="/"
                           hx-vals='{"page_num": {{page_number}}}'
                           hx-swap="innerHTML"
                           hx-target="#stock-data"
                           style="cursor:pointer;"
                        >{{page_number}}</a>
                    </li>
                {% endif %}
            {% endfor %}
        </ul>
    </nav>
</div>
