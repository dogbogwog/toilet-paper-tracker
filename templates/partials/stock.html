<div class="container text-left px-3">
    <div class="row">
        {% for item in items %}
            {% if loop.index <= 12*current_page and loop.index >= (12*current_page)-11 %}
                <div class="z-0 col-md-3 py-2 ">

                    <div class="badge position-absolute rounded text-white border border-secondary bg-opacity-50 m-1 bg-dark z-2" >#{{loop.index}}</div>

                    <a class="btn mb-5 p-0 shadow-sm {% if loop.index <= 4 %} btn-custom-best {% elif loop.index <= 8 %}btn-custom-second-best {% else %} btn-custom-default {% endif %}" style="max-width: 330px;" href={{item.link}} target="_blank" role="button">
                        <div class="row g-0">
                            <div class="col-md-4 z-1">
                               <img src="static/images/{{ [(loop.index/4) | round(0, 'ceil') | int, 3] | min }}.jpg" loading="lazy" width="100" class="img-fluid rounded-start border border-white ms-2" alt="...">
                            </div>
                            <div class="col-md-8">
                               <div class="pt-4">
                                  <p class="fs-2 my-0 py-0 lh-1 fw-bold text-center">${{item.price_per_thousand_sheets}} </p>
                                  <p class="text-secondary text-center text-opacity-50 mb-0 fw-light fs-6">per 1000 sheets</p>
                               </div>
                            </div>
                            <div class="row img-fluid rounded g-0 border border-white {% if loop.index <= 4 %}best-background-colour{% elif loop.index <= 8 %}second-best-background-colour{% else %}bg-body-secondary{% endif %} ">
                               <div class="d-flex">
                                   <small class="ps-1 my-1 fst-italic {% if loop.index <= 4 %} best-text-colour {% elif loop.index <= 8 %} second-best-text-colour {% else %} text-black-50 {% endif %}">{{item.name.split()[0]}}</small>
                                   <div class="col text-end">
                                   <small class="pe-2 my-1 fst-italic {% if loop.index <= 4 %} best-text-colour {% elif loop.index <= 8 %} second-best-text-colour {% else %} text-black-50 {% endif %}" >{{item.store}}</small>
                                   </div>
                               </div>
                            </div>
                        </div>
                    </a>
                </div>
            {% endif %}
        {% endfor %}
    </div>
</div>
